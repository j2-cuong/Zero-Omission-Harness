# ===========================================================
# TOKEN BUDGET CONFIGURATION v2.0
# Bổ sung: auto-trim, rollback, token types
# ===========================================================

budget:
  version: "2.0.0"
  
  # Budget allocation theo phase
  phases:
    interview:
      total: 50000
      input_ratio: 0.3    # 30% input, 70% output
      alert_at: 80%
      hard_block_at: 100%
      
    design:
      total: 30000
      input_ratio: 0.4
      alert_at: 80%
      hard_block_at: 100%
      
    coding:
      total: 100000
      input_ratio: 0.5
      alert_at: 80%
      hard_block_at: 100%
      per_task_budget: 5000  # Budget cho mỗi task
      
    validation:
      total: 20000
      input_ratio: 0.6
      alert_at: 75%
      hard_block_at: 95%
      
    testing:
      total: 30000
      input_ratio: 0.5
      alert_at: 80%
      hard_block_at: 100%
      
    release:
      total: 10000
      input_ratio: 0.7
      alert_at: 80%
      hard_block_at: 100%

# Tracking configuration
tracking:
  method: auto_log_every_request
  granularity: detailed  # detailed | summary
  
  # Token types tracking
  token_types:
    track_input: true
    track_output: true
    track_cache_read: true
    track_cache_write: true
    
  # Alert configuration
  alerts:
    on_threshold_exceed:
      - console_warning
      - state_flag
      - progress_note
    on_hard_block:
      - halt_pipeline
      - notify_user
      - suggest_optimization
      
  # Report format
  report_format:
    include_token_breakdown: true
    include_efficiency_metrics: true
    include_recommendations: true

# Auto-trim configuration
auto_trim:
  enabled: true
  trigger_at: 85%  # Kích hoạt khi đạt 85% budget
  
  strategy: oldest_context_first
  
  # Preserve list (không bao giờ trim)
  preserve:
    files:
      - ".agent/STATE.md"
      - ".agent/00_MASTER.md"
      - ".agent/01_STRUCTURE.md"
      - ".agent/contracts/*.md"
    
    tokens:
      - current_task_context
      - active_decisions
      - error_context
      
  # Trim sequence (thứ tự ưu tiên trim)
  trim_sequence:
    - old_chat_history
    - completed_task_details
    - old_file_versions
    - debug_logs
    - intermediate_calculations
    
  # Safety
  safety:
    min_context_to_keep: 1000  # Luôn giữ ít nhất 1000 tokens context
    ask_before_trim: false     # true = hỏi user trước khi trim
    backup_before_trim: true

# Rollback configuration
rollback:
  on_budget_exceed:
    enabled: true
    action: revert_to_last_checkpoint
    notify: true
    
  checkpoint_creation:
    auto_create_before_expensive_ops: true
    min_interval: 300s  # Tối thiểu 5 phút giữa các checkpoint
    
  recovery_options:
    - revert_to_checkpoint
    - split_into_smaller_tasks
    - request_additional_budget
    - escalate_to_user
    
  # Budget request escalation
  escalation:
    enabled: true
    max_additional_budget_percent: 20  # Cho phép xin thêm 20%
    require_justification: true
    approval_required: true

# Efficiency targets
efficiency:
  target_input_output_ratio: 0.5  # Target 50% input, 50% output
  min_useful_output_percent: 60   # Ít nhất 60% output phải là useful code
  
  optimization_suggestions:
    - "Use lazy loading for large files"
    - "Trim old chat history"
    - "Split complex tasks"
    - "Use summary instead of full content"
